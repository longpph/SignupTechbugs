<h2>Đăng ký tham gia săn lỗi</h2>
<form action="" method="post">
    <fieldset>
        <legend>Thông tin cá nhân</legend>
        <Label for="ten">Họ và tên: 
            <input type="text" name="ten" id="ten" placeholder="Nhập tên" required></Label><br><br>
        <label for="email">Email liên hệ:
            <input type="email" name="email" id="email" placeholder="Nhập email" required></label><br><br>
        <label for="matkhau">Mật khẩu: 
            <input type="password" name="matkhau" id="matkhau" placeholder="Mật khẩu" required></label><br>
    </fieldset>
    <fieldset>
        <legend>Trình độ chuyên môn</legend>
        <Label for="moi">
        <input type="radio" name="trinhdo" id="moi" value="Newbie" required>Mới tập chơi</Label>
        <label for="cu">
            <input type="radio" name="trinhdo" id="cu" value="Pro" required>Chuyên nghiệp</Label>
            <br><br>
        Kinh nghiệm nền tảng:<br>
        <Label for="web">
        <input type="checkbox" name="kinhnghiem[]" id="web" value="Web"> Web</Label>
        <label for="app">
        <input type="checkbox" name="kinhnghiem[]" id="app" value="Mobile"> Mobile App</label>
    </fieldset>
    <button type="submit">Đăng ký</button>
</form>
